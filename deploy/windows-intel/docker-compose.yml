services:
  ledger-mysql:
    image: ${MYSQL_IMAGE}
    container_name: ledger-mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ledger
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - ledger_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 30

  ledger-redis:
    image: ${REDIS_IMAGE}
    container_name: ledger-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ledger_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 30

  ledger-app:
    image: ${APP_IMAGE}
    container_name: ledger-app
    restart: unless-stopped
    depends_on:
      ledger-mysql:
        condition: service_healthy
      ledger-redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 7070
      LEDGER_HOST: ${LEDGER_HOST}
      LEDGER_PROFILE: /home/ledger/uploadPath
      JAVA_OPTS: ${JAVA_OPTS}
      SPRING_DATASOURCE_DRUID_MASTER_URL: jdbc:mysql://ledger-mysql:3306/ledger?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT%2B8
      SPRING_DATASOURCE_DRUID_MASTER_USERNAME: root
      SPRING_DATASOURCE_DRUID_MASTER_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_DATASOURCE_DRUID_SLAVE_ENABLED: "true"
      SPRING_DATASOURCE_DRUID_SLAVE_URL: jdbc:mysql://ledger-mysql:3306/manager?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT%2B8
      SPRING_DATASOURCE_DRUID_SLAVE_USERNAME: root
      SPRING_DATASOURCE_DRUID_SLAVE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_REDIS_HOST: ledger-redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "${APP_PORT}:7070"
    volumes:
      - ledger_uploads:/home/ledger/uploadPath
      - ledger_app_logs:/home/ledger/jar/logs

  ledger-nginx:
    image: ${NGINX_IMAGE}
    container_name: ledger-nginx
    restart: unless-stopped
    depends_on:
      - ledger-app
    ports:
      - "${WEB_PORT}:80"

volumes:
  ledger_mysql_data:
  ledger_redis_data:
  ledger_uploads:
  ledger_app_logs:
